{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Рапани</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
        }
        .navbar-brand, .navbar-text {
            color: #ffffff !important;
        }
        .btn-outline-primary {
            color: #ff3b3b;
            border-color: #ff3b3b;
        }
        .btn-outline-primary:hover {
            background-color: #ff3b3b;
            color: #ffffff;
        }
        .btn-outline-secondary {
            color: #ffffff;
            border-color: #ffffff;
        }
        .btn-outline-secondary:hover {
            background-color: #ffffff;
            color: #121212;
        }

        .alarm-overlay {
          position: fixed;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(255, 0, 0, 0.5);
          z-index: 1050;
          pointer-events: none;
        }
        .container {
          max-width: 1920px !important;
        }
    </style>
    {% block extrahead %}
    {% endblock %}
</head>
<body>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

  <div class="alarm-overlay d-none"></div>
    <nav class="navbar navbar-expand-lg bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
            </a>
            <div class="d-flex align-items-center">
                 {% if user.is_authenticated %}
                <span class="navbar-text me-2">Здравей, {{ user.first_name }}!</span>
                <a style="color: white;border-color: white;" href="{% url 'logout' %}" class="btn btn-outline-secondary btn-sm">Изход</a>
            {% else %}danger
                <a style="color: white;border-color: white;" href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Вход</a>
            {% endif %}
            </div>
        </div>
    </nav>
    <div class="alarm-text d-none bg-danger py-5 text-warning font-bold h1 text-center"></div>
    <div class="container" style="min-height: 47vh;">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
